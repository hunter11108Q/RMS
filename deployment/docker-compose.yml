version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rms_postgres
    restart: always
    environment:
      POSTGRES_DB: rms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpasswordchangeinprod
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: rms_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
